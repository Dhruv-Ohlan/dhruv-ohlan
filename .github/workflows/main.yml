name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Prevent overlapping runs from racing to push to main
concurrency:
  group: update-readme-cards-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add profile/*.svg
          git commit -m "Update README cards" || exit 0

          # Integrate any remote changes before pushing (fixes "fetch first")
          git fetch origin main
          git rebase origin/main

          # Push; if a race still happens, retry once
          git push || (git fetch origin main && git rebase origin/main && git push)
